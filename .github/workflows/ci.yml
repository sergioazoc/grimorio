name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint

      - run: pnpm format:check
